<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}SIREDO-TUS{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='assets/favicon.ico') }}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700,300italic,400italic,700italic"
        rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/lecturer.css') }}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" />
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="navbar {% block navbar_class %}bg-danger{% endblock %}" {% block navbar_style %}{% endblock %} {% block navbar_theme %}data-bs-theme="dark"{% endblock %}>
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('home') }}">
                <img src="{{ url_for('static', filename='assets/img/logonew.png') }}" alt="Telkom University logo" class="navbar-logo">
                <span class="visually-hidden">Research Recommender System</span>
            </a>

            <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3" style="position: relative;">
                <a class="nav-link text-white p-0 m-0" href="{{ url_for('home') }}">Home</a>
                <a class="nav-link text-white p-0 m-0" href="{{ url_for('lecturers_page') }}">Lecturers</a>
                <button id="approachToggle" type="button"
                    class="btn {% block btn_settings_class %}btn-danger{% endblock %} btn-sm d-flex align-items-center justify-content-center m-0"
                    title="Pengaturan Pendekatan" aria-label="Pengaturan Pendekatan" aria-expanded="false"
                    style="width:36px;height:36px;border-radius:50%;{% block btn_settings_style %}background-color:#dc3545;border-color:#dc3545;{% endblock %}color:#ffffff; align-self: center;">
                    <i class="bi-gear" style="pointer-events: none; color: #ffffff; font-size: 1rem; line-height: inherit; vertical-align: middle; display: inline-block; align-self: center;"></i>
                </button>
                <!-- Panel pengaturan pendekatan (dropdown) -->
                <div id="approachPanel" class="card shadow-sm"
                    style="position: absolute; right: 0; top: 48px; width: 260px; display: none; z-index: 1060;">
                    <div class="card-body py-2">
                        <label for="approachSelect" class="form-label mb-1">Approach</label>
                        <select class="form-select form-select-sm" id="approachSelect">
                            <option value="hybrid" selected>Hybrid (Naive Bayes) </option>
                            <option value="onevsrest">Multiclass (Naive Bayes) </option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Block content untuk konten halaman -->
    <div class="container-fluid my-0 px-0">
        {% block content %}
        {% endblock %}
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Toggle panel pendekatan
            const approachToggle = document.getElementById('approachToggle');
            const approachPanel = document.getElementById('approachPanel');
            if (approachToggle && approachPanel) {
                function setPanelVisible(show) {
                    approachPanel.style.display = show ? 'block' : 'none';
                    approachToggle.setAttribute('aria-expanded', show ? 'true' : 'false');
                }

                approachToggle.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const isShown = approachPanel.style.display !== 'none';
                    setPanelVisible(!isShown);
                });

                approachToggle.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        e.stopPropagation();
                        const isShown = approachPanel.style.display !== 'none';
                        setPanelVisible(!isShown);
                    }
                });

                // Klik di luar panel atau tombol -> tutup
                document.addEventListener('click', function (e) {
                    const clickOnToggle = approachToggle.contains(e.target);
                    const clickInsidePanel = approachPanel.contains(e.target);
                    if (!clickOnToggle && !clickInsidePanel) {
                        setPanelVisible(false);
                    }
                });
            }

            // Topic list click handlers: navigate directly to search page
            const topicItems = document.querySelectorAll('.topic-item');
            topicItems.forEach(item => {
                item.addEventListener('click', function (e) {
                    const topicData = this.dataset.topic;
                    if (topicData) {
                        e.preventDefault();
                        const topic = topicData.trim();
                        const selectedApproach = (document.getElementById('approachSelect')?.value || 'hybrid');
                        window.location.href = '{{ url_for('search_page') }}?keyword=' + encodeURIComponent(topic) + '&approach=' + encodeURIComponent(selectedApproach);
                    }
                });
            });
        });
    </script>

    <script>
        // Scroll-to-top button behavior
        (function () {
            const scrollBtn = document.getElementById('scrollTop');
            if (!scrollBtn) return;
            function updateScrollBtn() {
                if (window.scrollY > 200) {
                    scrollBtn.style.display = 'flex';
                } else {
                    scrollBtn.style.display = 'none';
                }
            }
            updateScrollBtn();
            document.addEventListener('scroll', updateScrollBtn);
            scrollBtn.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
